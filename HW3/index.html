<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSonar Fullscreen OS | 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        :root {
            --main-bg: #0d1117;
            --card-bg: #161b22;
            --main-cyan: #00e5ff;
            --main-red: #ff5252;
            --main-blue: #3498db;
            --border-color: #30363d;
        }

        /* 100% Screen Fit Logic */
        * { box-sizing: border-box; }
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; /* Prevents scrollbars */
            background: var(--main-bg);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #c9d1d9;
        }

        .desktop-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 15px;
            gap: 15px;
        }

        /* Header Section */
        .taskbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
            border-bottom: 1px solid var(--border-color);
            padding: 0 10px;
        }

        .logo { font-weight: 800; letter-spacing: 2px; color: #f0f6fc; font-size: 1.2rem; }
        .status-pill { 
            background: rgba(0, 229, 255, 0.1); 
            border: 1px solid var(--main-cyan); 
            color: var(--main-cyan); 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* Main Viewport Grid */
        .workspace {
            display: grid;
            grid-template-columns: 1fr 1.2fr 0.8fr; /* 3-column professional layout */
            gap: 15px;
            flex-grow: 1; /* Fills remaining height */
            min-height: 0; /* Important for grid nesting */
        }

        .panel {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            padding: 15px;
            min-height: 0;
        }

        .panel-header {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8b949e;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Input Grid - Optimized for Full Height */
        .scroll-area {
            flex-grow: 1;
            overflow-y: auto;
            background: #010409;
            border-radius: 4px;
            padding: 10px;
        }

        #sonar-input-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .sonar-cell {
            background: #161b22;
            border: 1px solid var(--border-color);
            color: var(--main-cyan);
            padding: 8px;
            font-size: 0.8rem;
            text-align: center;
            border-radius: 4px;
            width: 100%;
        }

        /* Metrics List */
        .metric-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #21262d;
        }
        .metric-label { color: #8b949e; font-size: 0.9rem; }
        .metric-value { color: var(--main-cyan); font-weight: bold; }

        /* Classification Center (Middle Panel) */
        .ai-display {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #ai-icon { font-size: 6rem; margin-bottom: 20px; transition: 0.5s; }
        #ai-label { font-size: 2.5rem; font-weight: 900; color: #f0f6fc; }

        /* Footer Controls */
        .action-bar {
            height: 70px;
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            border-radius: 6px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 1rem;
            transition: 0.2s;
        }

        .btn-primary { background: var(--main-cyan); color: #0d1117; }
        .btn-primary:hover { box-shadow: 0 0 20px rgba(0, 229, 255, 0.4); }
        
        .confidence-track {
            width: 100%;
            height: 10px;
            background: #010409;
            border-radius: 5px;
            margin-top: 20px;
            overflow: hidden;
        }
        #confidence-fill { width: 0%; height: 100%; background: var(--main-cyan); transition: 1s ease-out; }

    </style>
</head>
<body>

<div class="desktop-wrapper">
    <div class="taskbar">
        <div class="logo">DEEP SONAR <span style="font-weight: 300;">OS v2.0</span></div>
        <div class="status-pill">● ENGINE CORE LOADED</div>
    </div>

    <div class="workspace">
        
        <div class="panel">
            <div class="panel-header">📡 Array Signal Input</div>
            <div class="scroll-area">
                <div id="sonar-input-grid"></div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">🧠 Neural Processing Unit</div>
            <div class="ai-display">
                <div id="ai-icon">⚓</div>
                <div id="ai-label">IDLE</div>
                <div style="width: 70%;">
                    <div class="confidence-track"><div id="confidence-fill"></div></div>
                    <p id="conf-text" style="font-size: 0.8rem; margin-top: 10px; color: #8b949e;">AWAITING SIGNAL...</p>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">📊 Diagnostics & Training</div>
            <div class="metric-row"><span class="metric-label">Model Accuracy</span><span class="metric-value">87.5%</span></div>
            <div class="metric-row"><span class="metric-label">Optimizer</span><span class="metric-value">ADAM</span></div>
            <div class="metric-row"><span class="metric-label">Layers</span><span class="metric-value">3 Dense</span></div>
            <div class="metric-row"><span class="metric-label">Epochs</span><span class="metric-value">35</span></div>
            <div style="margin-top: auto;">
                <div class="panel-header">Training Convergence</div>
                <div id="miniChart"></div>
            </div>
        </div>

    </div>

    <div class="action-bar">
        <button class="btn btn-primary" onclick="runInference()">Execute Deep Scan</button>
        <button class="btn" style="background: #21262d; color: white;" onclick="location.reload()">Reset System</button>
    </div>
</div>

<script>
    // Build Grid
    const grid = document.getElementById('sonar-input-grid');
    for (let i = 1; i <= 60; i++) {
        const input = document.createElement('input');
        input.className = 'sonar-cell';
        input.value = (Math.random() * 0.1).toFixed(4);
        grid.appendChild(input);
    }

    // Mini Chart
    new ApexCharts(document.querySelector("#miniChart"), {
        series: [{ data: [0.7, 0.5, 0.4, 0.3, 0.2, 0.19] }],
        chart: { type: 'line', height: 120, sparklines: { enabled: true } },
        colors: ['#00e5ff'],
        stroke: { curve: 'smooth', width: 2 }
    }).render();

    function runInference() {
        const label = document.getElementById('ai-label');
        const icon = document.getElementById('ai-icon');
        const fill = document.getElementById('confidence-fill');
        const text = document.getElementById('conf-text');

        label.innerText = "SCANNING...";
        icon.style.transform = "rotate(360deg)";
        
        setTimeout(() => {
            const isMine = Math.random() > 0.5;
            const conf = (Math.random() * 20 + 80).toFixed(1);
            
            if(isMine) {
                label.innerText = "MINE DETECTED";
                label.style.color = "#ff5252";
                icon.innerText = "💥";
                fill.style.background = "#ff5252";
            } else {
                label.innerText = "ROCK";
                label.style.color = "#3498db";
                icon.innerText = "⛰️";
                fill.style.background = "#3498db";
            }
            fill.style.width = conf + "%";
            text.innerText = "CONFIDENCE: " + conf + "%";
            icon.style.transform = "rotate(0deg) scale(1.2)";
        }, 1000);
    }
</script>
</body>
</html>
